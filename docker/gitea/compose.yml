services:
  server:
    image: gitea/gitea:1.27.0@sha256:7b58541345f52eda63f11f3ec3d575193e91a0934b7841a66a7ee245a66f764a
    container_name: gitea
    restart: unless-stopped
    environment:
      # Exception to the non-root rule: the image's init needs root, but the
      # internal git user is mapped to the gitea system user (setup-permissions.yaml)
      - USER_UID=2002
      - USER_GID=2002
    networks:
      - gitea
    volumes:
      - ./data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"

networks:
  gitea:
    external: true
