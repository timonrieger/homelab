services:
  immich-public-proxy:
    image: alangrainger/immich-public-proxy:2.4.0@sha256:745c2ed43e7c817752892cce3e262b542ed7d0694b4274030ac9f5217bf96b0a
    container_name: immich-public-proxy
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PUBLIC_BASE_URL: https://immich-share.timonrieger.de
      IMMICH_URL: http://beelink:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    volumes:
      - ./config.json:/app/config.json:ro
