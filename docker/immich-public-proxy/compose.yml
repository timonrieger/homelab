services:
  immich-public-proxy:
    image: alangrainger/immich-public-proxy:1.15.4@sha256:e8be2da895ab7e57bee99b79dca0288c1de5cf2dab07b1821569ecc778623df9
    container_name: immich-public-proxy
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PUBLIC_BASE_URL: https://immich-share.timonrieger.de
      IMMICH_URL: http://beelink:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    volumes:
      - ./config.json:/app/config.json:ro
