services:
  immich-public-proxy:
    image: alangrainger/immich-public-proxy:2.4.2@sha256:c28197065d7a5fdde77ba2f097f78388690255d153b564c249fc55e4fc952e8d
    container_name: immich-public-proxy
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PUBLIC_BASE_URL: https://immich-share.timonrieger.de
      IMMICH_URL: http://beelink:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    volumes:
      - ./config.json:/app/config.json:ro
