services:
  immich-public-proxy:
    image: alangrainger/immich-public-proxy:2.2.1@sha256:c8dbb428487302400b9a857c5cf82055d2ea511345c9d695278539be9aa330cf
    container_name: immich-public-proxy
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PUBLIC_BASE_URL: https://immich-share.timonrieger.de
      IMMICH_URL: http://beelink:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    volumes:
      - ./config.json:/app/config.json:ro
