services:
  immich-public-proxy:
    image: alangrainger/immich-public-proxy:2.0.0@sha256:36902f17fbc1fb7581ece78691f35aa39510423e68c90dd1e9934a65449a98a3
    container_name: immich-public-proxy
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PUBLIC_BASE_URL: https://immich-share.timonrieger.de
      IMMICH_URL: http://beelink:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    volumes:
      - ./config.json:/app/config.json:ro
