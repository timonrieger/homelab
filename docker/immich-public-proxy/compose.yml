services:
  immich-public-proxy:
    image: alangrainger/immich-public-proxy:2.1.1@sha256:65ff9e9c77960d7654c8af57b9cbb1c2e56c374b61e31923469a205c797c32eb
    container_name: immich-public-proxy
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PUBLIC_BASE_URL: https://immich-share.timonrieger.de
      IMMICH_URL: http://beelink:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    volumes:
      - ./config.json:/app/config.json:ro
